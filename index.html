<!doctype html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Primary Meta Tags -->
    <title>FlowMatch — Search 5,000+ n8n Workflow Templates | AI Workflow Discovery</title>
    <meta name="title" content="FlowMatch — Search 5,000+ n8n Workflow Templates | AI Workflow Discovery" />
    <meta name="description" content="Discover 5,000+ verified n8n workflow templates. Search, compare, visualize, and deploy automation workflows with AI-powered matching, security analysis, and 300+ integrations." />
    <meta name="keywords" content="n8n, workflow templates, automation, workflow discovery, AI matching, no-code, low-code, integrations, workflow automation, n8n templates" />
    <meta name="author" content="ProgVision" />
    <meta name="robots" content="index, follow" />
    <link rel="canonical" href="https://flowmatch.progvision.in/" />

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://flowmatch.progvision.in/" />
    <meta property="og:title" content="FlowMatch — Search 5,000+ n8n Workflow Templates" />
    <meta property="og:description" content="Discover 5,000+ verified n8n workflow templates. Search, compare, visualize, and deploy automation workflows with AI-powered matching and 300+ integrations." />
    <meta property="og:image" content="https://flowmatch.progvision.in/og-image.png" />
    <meta property="og:site_name" content="FlowMatch" />
    <meta property="og:locale" content="en_US" />

    <!-- Twitter -->
    <meta property="twitter:card" content="summary_large_image" />
    <meta property="twitter:url" content="https://flowmatch.progvision.in/" />
    <meta property="twitter:title" content="FlowMatch — Search 5,000+ n8n Workflow Templates" />
    <meta property="twitter:description" content="Discover 5,000+ verified n8n workflow templates. AI-powered matching, security scanning, and 300+ integrations." />
    <meta property="twitter:image" content="https://flowmatch.progvision.in/og-image.png" />

    <!-- Structured Data (JSON-LD) -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "FlowMatch",
      "alternateName": "FlowMatch Workflow Discovery",
      "url": "https://flowmatch.progvision.in",
      "description": "Search 5,000+ verified n8n workflow templates with AI-powered matching, security analysis, and 300+ integrations.",
      "potentialAction": {
        "@type": "SearchAction",
        "target": {
          "@type": "EntryPoint",
          "urlTemplate": "https://flowmatch.progvision.in/workflows?q={search_term_string}"
        },
        "query-input": "required name=search_term_string"
      }
    }
    </script>
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "SoftwareApplication",
      "name": "FlowMatch",
      "applicationCategory": "DeveloperApplication",
      "operatingSystem": "Web",
      "offers": {
        "@type": "Offer",
        "price": "0",
        "priceCurrency": "USD"
      },
      "author": {
        "@type": "Organization",
        "name": "ProgVision",
        "url": "https://github.com/ganeshkrishnareddy"
      },
      "description": "Open-source n8n workflow search engine with AI matching, security scanning, and 5,000+ curated templates.",
      "screenshot": "https://flowmatch.progvision.in/og-image.png",
      "softwareVersion": "1.0.0",
      "license": "https://opensource.org/licenses/MIT"
    }
    </script>

    <!-- Preconnect to external origins -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
